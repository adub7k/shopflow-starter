<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Off-Kut — Check In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--accent:#1a1a1a;--green:#1D9E75;--blue:#378ADD;--orange:#EF9F27;--red:#e74c3c;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;color:#fff;-webkit-font-smoothing:antialiased;}
#app{height:100%;display:flex;flex-direction:column;}

/* Header */
#header{padding:24px 32px 16px;text-align:center;flex-shrink:0;}
#shop-name{font-size:28px;font-weight:800;letter-spacing:-0.5px;}
#shop-tagline{font-size:14px;opacity:0.6;margin-top:4px;}
#scissors{font-size:36px;margin-bottom:8px;}

/* Screen container */
#screen{flex:1;overflow-y:auto;padding:0 24px 32px;-webkit-overflow-scrolling:touch;}

/* Steps */
.step{display:none;animation:fadeIn 0.2s ease;}
.step.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Step title */
.step-title{font-size:22px;font-weight:700;margin-bottom:6px;text-align:center;padding-top:8px;}
.step-sub{font-size:14px;opacity:0.6;text-align:center;margin-bottom:24px;}

/* Name input */
#name-input{width:100%;padding:20px 24px;font-size:24px;border:2px solid rgba(255,255,255,0.2);border-radius:16px;background:rgba(255,255,255,0.08);color:#fff;outline:none;text-align:center;font-family:inherit;}
#name-input:focus{border-color:rgba(255,255,255,0.5);}
#name-input::placeholder{opacity:0.4;}
#returning-list{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;}
.returning-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px 20px;color:#fff;font-size:16px;font-weight:500;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;font-family:inherit;}
.returning-btn:active{background:rgba(255,255,255,0.15);}
.returning-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}

/* Service grid */
.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.service-card{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px 14px;cursor:pointer;text-align:center;transition:all 0.15s;}
.service-card:active,.service-card.selected{border-color:var(--green);background:rgba(29,158,117,0.15);}
.service-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.service-price{font-size:22px;font-weight:800;color:var(--green);}
.service-duration{font-size:12px;opacity:0.5;margin-top:2px;}
.cat-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 8px;}

/* Barber cards */
.barber-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.barber-card{border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px 14px;cursor:pointer;text-align:center;transition:all 0.15s;}
.barber-card:active,.barber-card.selected{border-color:var(--blue);}
.barber-avatar{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;}
.barber-name{font-size:18px;font-weight:700;}
.barber-wait{font-size:12px;opacity:0.5;margin-top:4px;}
.no-pref-card{border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px;cursor:pointer;text-align:center;font-size:16px;font-weight:600;opacity:0.7;transition:all 0.15s;}
.no-pref-card:active,.no-pref-card.selected{border-color:rgba(255,255,255,0.5);opacity:1;}

/* Big buttons */
.big-btn{width:100%;padding:20px;border-radius:16px;border:none;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-bottom:12px;}
.big-btn:active{transform:scale(0.98);}
.btn-green{background:var(--green);color:#fff;}
.btn-outline{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.2);}

/* Confirmation screen */
#confirm-screen{text-align:center;padding:20px 0;}
#confirm-emoji{font-size:72px;margin-bottom:16px;}
#confirm-name{font-size:28px;font-weight:800;margin-bottom:6px;}
#confirm-service{font-size:16px;opacity:0.7;margin-bottom:24px;}
#confirm-position{background:rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin-bottom:16px;}
#confirm-pos-num{font-size:56px;font-weight:800;color:var(--green);line-height:1;}
#confirm-pos-label{font-size:14px;opacity:0.6;margin-top:4px;}
#confirm-wait{font-size:16px;opacity:0.7;margin-top:12px;}
#confirm-barber{margin-top:8px;font-size:15px;opacity:0.8;}
.confirm-done-btn{margin-top:24px;}

/* Keyboard hint */
#keyboard-hint{text-align:center;padding:12px;font-size:13px;opacity:0.4;flex-shrink:0;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="scissors">&#9986;</div>
    <div id="shop-name">ShopFlow</div>
    <div id="shop-tagline">Walk-ins Welcome.</div>
  </div>

  <div id="screen">
    <!-- Step 1: Name -->
    <div class="step active" id="step-name">
      <div class="step-title">Welcome! &#128075;</div>
      <div class="step-sub">Enter your name and phone number to get in line</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <input id="first-name" type="text" placeholder="First name" autocomplete="off" autocorrect="off" spellcheck="false"
          style="width:100%;padding:18px 20px;font-size:20px;border:2px solid rgba(255,255,255,0.2);border-radius:16px;background:rgba(255,255,255,0.08);color:#fff;outline:none;font-family:inherit;" />
        <input id="last-name" type="text" placeholder="Last name" autocomplete="off" autocorrect="off" spellcheck="false"
          style="width:100%;padding:18px 20px;font-size:20px;border:2px solid rgba(255,255,255,0.2);border-radius:16px;background:rgba(255,255,255,0.08);color:#fff;outline:none;font-family:inherit;" />
      </div>
      <input id="phone-input" type="tel" placeholder="Phone number" autocomplete="off"
        style="width:100%;padding:18px 20px;font-size:20px;border:2px solid rgba(255,255,255,0.2);border-radius:16px;background:rgba(255,255,255,0.08);color:#fff;outline:none;font-family:inherit;margin-bottom:12px;" />
      <div id="returning-list"></div>
      <button class="big-btn btn-green" onclick="Kiosk.goToService()" style="margin-top:12px;">Continue &#8594;</button>
    </div>

    <!-- Step 2: Service -->
    <div class="step" id="step-service">
      <div class="step-title">What are you getting?</div>
      <div class="step-sub">Tap your service</div>
      <div id="service-list"></div>
      <button class="big-btn btn-outline" onclick="Kiosk.goTo('name')">&#8592; Back</button>
    </div>

    <!-- Step 3: Barber -->
    <div class="step" id="step-barber">
      <div class="step-title">Pick your barber</div>
      <div class="step-sub">Or choose no preference</div>
      <div class="barber-grid" id="barber-list"></div>
      <div class="no-pref-card" id="no-pref-card" onclick="Kiosk.selectBarber(null,null)">
        &#127937; No preference — first available
      </div>
      <br/>
      <button class="big-btn btn-outline" onclick="Kiosk.goTo('service')" style="margin-top:12px;">&#8592; Back</button>
    </div>

    <!-- Step 4: Confirm -->
    <div class="step" id="step-confirm">
      <div id="confirm-screen">
        <div id="confirm-emoji">&#127937;</div>
        <div id="confirm-name"></div>
        <div id="confirm-service"></div>
        <div id="confirm-position">
          <div id="confirm-pos-num">—</div>
          <div id="confirm-pos-label">in line</div>
        </div>
        <div id="confirm-wait"></div>
        <div id="confirm-barber"></div>
        <button class="big-btn btn-green confirm-done-btn" onclick="Kiosk.reset()">Done &#10003;</button>
      </div>
    </div>
  </div>

  <div id="keyboard-hint">Tap your name above to get started</div>
</div>

<script>
const Kiosk = {
  _name: '',
  _phone: '',
  _customerId: null,
  _service: null,
  _servicePrice: 0,
  _barberId: null,
  _barberName: null,
  _barbers: [],
  _services: [],
  _queue: [],

  async init() {
    try {
      const [settings, barbers, services, queue] = await Promise.all([
        fetch('/api/settings').then(r=>r.json()),
        fetch('/api/barbers').then(r=>r.json()),
        fetch('/api/services').then(r=>r.json()),
        fetch('/api/queue').then(r=>r.json()),
      ]);
      if (settings.shopName) document.getElementById('shop-name').textContent = settings.shopName;
      if (settings.tagline) document.getElementById('shop-tagline').textContent = settings.tagline;
      this._barbers = barbers;
      this._services = services;
      this._queue = queue;
      this._buildServiceList();
      this._buildBarberList();
      this._setupNameInput();
    } catch(e) {
      console.error('Kiosk init error:', e);
    }
  },

  _setupNameInput() {
    const input = document.getElementById('name-input');
    let timer;
    input.addEventListener('input', () => {
      clearTimeout(timer);
      const q = input.value.trim();
      if (q.length < 2) { document.getElementById('returning-list').innerHTML = ''; return; }
      timer = setTimeout(async () => {
        try {
          const results = await fetch('/api/customers/search?q='+encodeURIComponent(q)).then(r=>r.json());
          const list = document.getElementById('returning-list');
          if (!results.length) { list.innerHTML = ''; return; }
          list.innerHTML = results.slice(0,4).map(c => {
            const initials = c.name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
            return '<button class="returning-btn" onclick="Kiosk.selectReturning(\''+c.id+'\',\''+c.name.replace(/'/g,'')+'\')">' +
              '<div class="returning-avatar">'+initials+'</div>' +
              '<div><div style="font-weight:700;">'+c.name+'</div>' +
              '<div style="font-size:12px;opacity:.5;">Returning client'+(c.preferredService?' &middot; '+c.preferredService:'')+'</div></div>' +
              '</button>';
          }).join('');
        } catch(e) {}
      }, 300);
    });
  },

  selectReturning(id, name, phone) {
    const parts = name.split(' ');
    const first = parts[0] || '';
    const last  = parts.slice(1).join(' ') || '';
    this._name = name;
    this._customerId = id;
    const fn = document.getElementById('first-name'); if(fn) fn.value = first;
    const ln = document.getElementById('last-name');  if(ln) ln.value = last;
    const ph = document.getElementById('phone-input');if(ph) ph.value = phone||'';
    document.getElementById('returning-list').innerHTML = '';
    this.goToService();
  },

  goToService() {
    const first = document.getElementById('first-name')?.value.trim();
    const last  = document.getElementById('last-name')?.value.trim();
    const phone = document.getElementById('phone-input')?.value.trim();
    if (!first) { document.getElementById('first-name').focus(); return; }
    this._name = (first + ' ' + last).trim();
    this._phone = phone;
    this.goTo('service');
  },

  _buildServiceList() {
    const cats = [
      { key:'cut',    label:'&#9986; Haircuts' },
      { key:'beard',  label:'&#129492; Beard Work' },
      { key:'combo',  label:'&#127775; Combos' },
      { key:'color',  label:'&#127775; Color' },
      { key:'design', label:'&#10024; Designs' },
    ];
    const container = document.getElementById('service-list');
    let html = '';
    cats.forEach(cat => {
      const services = this._services.filter(s=>s.category===cat.key);
      if (!services.length) return;
      html += '<div class="cat-label">'+cat.label+'</div>';
      html += '<div class="service-grid">';
      services.forEach(s => {
        html += '<div class="service-card" id="svc-'+s.id+'" onclick="Kiosk.selectService(\''+s.id+'\',\''+s.name.replace(/'/g,'')+'\','+s.price+')">' +
          '<div class="service-name">'+s.name+'</div>' +
          '<div class="service-price">$'+s.price+'</div>' +
          '<div class="service-duration">&#9202; '+s.duration+' min</div>' +
          '</div>';
      });
      html += '</div>';
    });
    container.innerHTML = html;
  },

  selectService(id, name, price) {
    document.querySelectorAll('.service-card').forEach(c=>c.classList.remove('selected'));
    const card = document.getElementById('svc-'+id);
    if (card) card.classList.add('selected');
    this._service = name;
    this._servicePrice = price;
    setTimeout(() => this.goTo('barber'), 300);
  },

  _buildBarberList() {
    const container = document.getElementById('barber-list');
    const inChair = this._queue.filter(q=>q.status==='in-chair');
    const waiting = this._queue.filter(q=>q.status==='waiting');
    let html = '';
    this._barbers.forEach(b => {
      const busyWith = inChair.find(q=>q.barberId===b.id);
      const myQueue = waiting.filter(q=>q.barberId===b.id).length;
      const waitMins = busyWith ? 30 + (myQueue * 35) : (myQueue * 35);
      const initials = b.name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
      html += '<div class="barber-card" id="barber-'+b.id+'" onclick="Kiosk.selectBarber(\''+b.id+'\',\''+b.name+'\')" style="background:'+b.color+'18;border-color:'+b.color+'44;">' +
        '<div class="barber-avatar" style="background:'+b.color+'33;color:'+b.color+';">'+initials+'</div>' +
        '<div class="barber-name">'+b.name+'</div>' +
        '<div class="barber-wait">'+(busyWith?'In a cut now':'Available')+(waitMins>0?' &middot; ~'+waitMins+'m wait':'')+'</div>' +
        '</div>';
    });
    container.innerHTML = html;
  },

  selectBarber(id, name) {
    document.querySelectorAll('.barber-card,.no-pref-card').forEach(c=>c.classList.remove('selected'));
    if (id) {
      const card = document.getElementById('barber-'+id);
      if (card) card.classList.add('selected');
    } else {
      document.getElementById('no-pref-card').classList.add('selected');
    }
    this._barberId = id;
    this._barberName = name;
    setTimeout(() => this.checkIn(), 300);
  },

  async checkIn() {
    try {
      const waiting = this._queue.filter(q=>q.status==='waiting').length;
      const inChair = this._queue.filter(q=>q.status==='in-chair').length;
      const position = waiting + inChair + 1;
      const avgServiceTime = 35;
      const waitMins = waiting * avgServiceTime;

      const res = await fetch('/api/queue', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          customerId: this._customerId,
          customerName: this._name,
          customerPhone: this._phone||'',
          // Save phone to customer if new
          barberId: this._barberId,
          barberName: this._barberName,
          service: this._service || 'Haircut',
          price: this._servicePrice || 35,
          status: 'waiting',
          notes: '',
        })
      });

      // Show confirmation
      document.getElementById('confirm-name').textContent = this._name + '!';
      document.getElementById('confirm-service').textContent = this._service || 'Haircut';
      document.getElementById('confirm-pos-num').textContent = position;
      document.getElementById('confirm-pos-label').textContent = position === 1 ? "You're up next!" : 'in line';
      document.getElementById('confirm-wait').textContent = waitMins > 0 ? 'Estimated wait: ~' + waitMins + ' minutes' : "You're up next — have a seat!";
      document.getElementById('confirm-barber').innerHTML = this._barberName ? '&#9986; ' + this._barberName : '';

      if (position === 1) {
        document.getElementById('confirm-emoji').innerHTML = '&#127937;';
      } else if (position <= 3) {
        document.getElementById('confirm-emoji').innerHTML = '&#9986;';
      } else {
        document.getElementById('confirm-emoji').innerHTML = '&#128172;';
      }

      this.goTo('confirm');

      // Auto reset after 12 seconds
      setTimeout(() => this.reset(), 12000);

    } catch(e) {
      alert('Could not check in — please see staff.');
    }
  },

  goTo(step) {
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('step-'+step).classList.add('active');
  },

  reset() {
    this._name = '';
    this._customerId = null;
    this._service = null;
    this._servicePrice = 0;
    this._barberId = null;
    this._barberName = null;
    const fn=document.getElementById('first-name');if(fn)fn.value='';
    const ln=document.getElementById('last-name');if(ln)ln.value='';
    const ph=document.getElementById('phone-input');if(ph)ph.value='';
    document.getElementById('returning-list').innerHTML = '';
    this._phone = '';
    document.querySelectorAll('.service-card,.barber-card,.no-pref-card').forEach(c=>c.classList.remove('selected'));
    this.goTo('name');
    // Refresh queue data
    fetch('/api/queue').then(r=>r.json()).then(q=>{this._queue=q;this._buildBarberList();}).catch(()=>{});
    const fn2=document.getElementById('first-name');if(fn2)fn2.focus();
  }
};

// Boot kiosk
Kiosk.init();
</script>
</body>
</html>
